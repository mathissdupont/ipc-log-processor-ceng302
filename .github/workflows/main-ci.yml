name: Main CI

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  contract-check:
    name: Validate Main Contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required root files
        run: |
          REQUIRED=(
            "myData_pipe.c"
            "myMore_pipe.c"
            "myData_shm.c"
            "myMore_shm.c"
            "web_server_logs.txt"
            "db_server_logs.txt"
            "scripts/test_script.sh"
          )

          for file in "${REQUIRED[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "::error::Missing required file: $file"
              exit 1
            fi
          done

  build-and-test:
    name: Build and Test on Main
    runs-on: ubuntu-latest
    needs: contract-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect placeholder source files
        id: placeholder_check
        run: |
          FILES=(
            "myData_pipe.c"
            "myMore_pipe.c"
            "myData_shm.c"
            "myMore_shm.c"
          )

          PLACEHOLDER_FOUND=0
          for file in "${FILES[@]}"; do
            if grep -qi "intentionally left empty" "$file"; then
              PLACEHOLDER_FOUND=1
            fi
          done

          echo "placeholder_found=$PLACEHOLDER_FOUND" >> "$GITHUB_OUTPUT"

      - name: Grant execute permission
        if: steps.placeholder_check.outputs.placeholder_found == '0'
        run: chmod +x scripts/test_script.sh

      - name: Run assignment test script
        if: steps.placeholder_check.outputs.placeholder_found == '0'
        run: bash scripts/test_script.sh

      - name: Main build skipped note
        if: steps.placeholder_check.outputs.placeholder_found != '0'
        run: echo "Placeholder sources detected. Build/test skipped on main."
