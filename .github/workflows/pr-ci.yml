name: PR CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pr-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-pr:
    name: Validate PR Contract
    runs-on: ubuntu-latest
    outputs:
      can_test: ${{ steps.placeholder_check.outputs.can_test }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate branch naming
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "PR branch: $BRANCH"
          if [[ ! "$BRANCH" =~ ^feature\/(pipe|shm|test-report)$ ]]; then
            echo "::error::Branch name must be one of feature/pipe, feature/shm, feature/test-report"
            exit 1
          fi

      - name: Validate required root files
        run: |
          REQUIRED=(
            "myData_pipe.c"
            "myMore_pipe.c"
            "myData_shm.c"
            "myMore_shm.c"
            "web_server_logs.txt"
            "db_server_logs.txt"
            "scripts/test_script.sh"
          )

          for file in "${REQUIRED[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "::error::Missing required file: $file"
              exit 1
            fi
          done

      - name: Detect placeholder source files
        id: placeholder_check
        run: |
          FILES=(
            "myData_pipe.c"
            "myMore_pipe.c"
            "myData_shm.c"
            "myMore_shm.c"
          )

          PLACEHOLDER_FOUND=0
          for file in "${FILES[@]}"; do
            if grep -qi "intentionally left empty" "$file"; then
              echo "::warning::$file is still placeholder. Compile/test stage will be skipped."
              PLACEHOLDER_FOUND=1
            fi
          done

          if [[ "$PLACEHOLDER_FOUND" -eq 1 ]]; then
            echo "can_test=false" >> "$GITHUB_OUTPUT"
          else
            echo "can_test=true" >> "$GITHUB_OUTPUT"
          fi

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: validate-pr
    if: needs.validate-pr.outputs.can_test == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Grant execute permission
        run: chmod +x scripts/test_script.sh

      - name: Run assignment test script
        run: bash scripts/test_script.sh

      - name: Upload test report artifacts (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: test/test-report
          if-no-files-found: ignore

  skipped-note:
    name: Skip Note
    runs-on: ubuntu-latest
    needs: validate-pr
    if: needs.validate-pr.outputs.can_test != 'true'
    steps:
      - name: Explain skipped tests
        run: |
          echo "Source files are placeholders. Build/test was intentionally skipped."
          echo "Replace placeholder content with implementation to enable full CI test stage."
